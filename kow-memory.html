<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Match Game</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="kow-style.css">
  <link rel="stylesheet" href="buttons.css">
  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 80px);
      gap: 15px;
      justify-content: center;
      margin-top: 20px;
    }
    .card {
      width: 80px;
      height: 80px;
      background-color: var(--neon-pink);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 0 #d4143a;
      transition: all 0.2s;
    }
    .card:hover { transform: translateY(-2px); }
    .matched {
      background-color: var(--neon-green);
      box-shadow: 0 6px 0 #3cb353;
      cursor: default;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-yellow-400 via-pink-500 to-blue-500 text-gray-800 font-sans min-h-screen pb-20">
  <div id="overlay" class="overlay-kow"></div>
  <div id="sidebar" class="sidebar-kow">
      <div class="flex justify-between items-center mb-8">
          <h2 class="text-3xl font-black text-pink-600 italic">FUN MENU!</h2>
          <button id="close-sidebar" class="text-4xl font-bold text-blue-500">✕</button>
      </div>
      <div class="flex flex-col space-y-4">
        <button onclick="window.location.href='index.html'" data-page="index.html" class="button button-blue w-full text-xl">🏠 Home</button>
        <button onclick="window.location.href='kow-games.html'" data-page="kow-games.html" class="button button-pink w-full text-xl">🎮 Games</button>
        <button onclick="window.location.href='kow-studies.html'" data-page="kow-studies.html" class="button button-green w-full text-xl text-gray-800">📚 Studies</button>
        <button onclick="window.location.href='kow-quizzes.html'" data-page="kow-quizzes.html" class="button button-purple w-full text-xl">❓ Quizzes</button>
        <button onclick="window.location.href='kow-news.html'" data-page="kow-news.html" class="button button-orange w-full text-xl">🗞️ News</button>
        <button onclick="window.location.href='kow-videos.html'" data-page="kow-videos.html" class="button button-yellow w-full text-xl text-gray-800">🎥 Videos</button>
        <button onclick="window.location.href='kow-timediscipline.html'" data-page="kow-timediscipline.html" class="button button-green w-full text-xl text-gray-800">⏰ Time</button>
      </div>
  </div>

  <nav class="navbar-kow p-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center">
      <button id="menu-button" class="text-pink-600 text-5xl font-bold mr-6 hover:scale-110 transition-transform">☰</button>
      <h1 class="text-4xl font-black text-white glow-text animate-bounce cursor-pointer tracking-tighter" onclick="window.location.href='index.html'">🌍 KIDS ONLINE WORLD</h1>
    </div>
  </nav>

  <section class="text-center p-6">
    <h1 class="text-5xl font-black text-pink-600 glow-text mb-4">🧠 Memory Match</h1>
    <p class="text-xl text-gray-700 mb-8 font-bold">Match the pairs to win! ✨</p>

    <div class="game-container inline-block p-10 shadow-2xl">
        <div class="grid" id="gameBoard"></div>
    </div>

    <div id="celebration" class="mt-8 text-4xl font-black text-green-600 hidden glow-text animate-bounce">
        🎉 UNBELIEVABLE! YOU MATCHED THEM ALL! 🏆
    </div>

    <div class="mt-12 flex justify-center gap-4">
        <button onclick="startGame()" class="button button-pink text-xl">🔄 Restart</button>
        <button onclick="window.location.href='kow-games.html'" class="button button-blue text-xl">🎮 More Games</button>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script>
    const icons = ['🐶','🐱','🦊','🐻','🐼','🐸','🐵','🐯'];
    let cards = [];
    let flipped = [];
    let matched = [];

    function startGame() {
      const board = document.getElementById('gameBoard');
      board.innerHTML = '';
      matched = [];
      flipped = [];
      cards = shuffle([...icons, ...icons]);
      document.getElementById('celebration').classList.add('hidden');

      cards.forEach((icon, i) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.dataset.index = i;
        div.onclick = () => flipCard(div, icon);
        board.appendChild(div);
      });
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function flipCard(div, icon) {
      const index = div.dataset.index;
      if (matched.includes(index) || flipped.includes(index) || flipped.length === 2) return;

      div.textContent = icon;
      flipped.push(index);

      if (flipped.length === 2) {
        const [i1, i2] = flipped;
        const d1 = document.querySelector(`[data-index='${i1}']`);
        const d2 = document.querySelector(`[data-index='${i2}']`);
        if (cards[i1] === cards[i2]) {
          matched.push(i1, i2);
          d1.classList.add('matched');
          d2.classList.add('matched');
          checkWin();
        } else {
          setTimeout(() => {
            d1.textContent = '';
            d2.textContent = '';
          }, 800);
        }
        flipped = [];
      }
    }

    function checkWin() {
      if (matched.length === cards.length) {
        document.getElementById('celebration').classList.remove('hidden');
        confetti({
          particleCount: 200,
          spread: 120,
          origin: { y: 0.6 },
          colors: ['#ff006e', '#3a86ff', '#00f5d4', '#fee440', '#be0aff']
        });
      }
    }

    // Sidebar Logic
    document.getElementById('menu-button').addEventListener('click', () => {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('overlay').classList.add('show');
    });
    document.getElementById('overlay').addEventListener('click', closeSidebar);
    document.getElementById('close-sidebar').addEventListener('click', closeSidebar);
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
    }

    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll(`[data-page="${currentPage}"]`).forEach(btn => btn.style.display = 'none');

    startGame();
  </script>
</body>
</html>
