<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Puzzle Game - Sliding Puzzle</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="kow-style.css">
  <link rel="stylesheet" href="buttons.css">
  <style>
    #puzzle-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-gap: 5px;
      justify-content: center;
      margin: 20px auto;
      max-width: 400px;
      background-color: var(--neon-blue);
      aspect-ratio: 1 / 1;
      padding: 5px;
      border-radius: 12px;
    }
    .puzzle-piece {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5em;
      font-weight: 900;
      color: #333;
      background-color: #f0f0f0;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 8px;
    }
    .puzzle-piece:hover { background-color: white; }
    .puzzle-piece.empty {
      background-color: transparent;
      cursor: default;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-yellow-400 via-pink-500 to-blue-500 text-gray-800 font-sans min-h-screen pb-20">
  <div id="overlay" class="overlay-kow"></div>
  <div id="sidebar" class="sidebar-kow">
      <div class="flex justify-between items-center mb-8">
          <h2 class="text-3xl font-black text-pink-600 italic">FUN MENU!</h2>
          <button id="close-sidebar" class="text-4xl font-bold text-blue-500">✕</button>
      </div>
      <div class="flex flex-col space-y-4">
        <button onclick="window.location.href='index.html'" data-page="index.html" class="button button-blue w-full text-xl">🏠 Home</button>
        <button onclick="window.location.href='kow-games.html'" data-page="kow-games.html" class="button button-pink w-full text-xl">🎮 Games</button>
        <button onclick="window.location.href='kow-studies.html'" data-page="kow-studies.html" class="button button-green w-full text-xl text-gray-800">📚 Studies</button>
        <button onclick="window.location.href='kow-quizzes.html'" data-page="kow-quizzes.html" class="button button-purple w-full text-xl">❓ Quizzes</button>
        <button onclick="window.location.href='kow-news.html'" data-page="kow-news.html" class="button button-orange w-full text-xl">🗞️ News</button>
        <button onclick="window.location.href='kow-videos.html'" data-page="kow-videos.html" class="button button-yellow w-full text-xl text-gray-800">🎥 Videos</button>
        <button onclick="window.location.href='kow-timediscipline.html'" data-page="kow-timediscipline.html" class="button button-green w-full text-xl text-gray-800">⏰ Time</button>
      </div>
  </div>

  <nav class="navbar-kow p-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center">
      <button id="menu-button" class="text-pink-600 text-5xl font-bold mr-6 hover:scale-110 transition-transform">☰</button>
      <h1 class="text-4xl font-black text-white glow-text animate-bounce cursor-pointer tracking-tighter" onclick="window.location.href='index.html'">🌍 KIDS ONLINE WORLD</h1>
    </div>
  </nav>

  <section class="text-center p-6">
    <h1 class="text-5xl font-black text-pink-600 glow-text mb-4">🧩 Sliding Puzzle</h1>
    <p class="text-xl text-gray-700 mb-8 font-bold">Solve the puzzle to be a Ninja! 🥷</p>

    <div class="game-container inline-block p-6 shadow-2xl">
        <div id="puzzle-container"></div>
    </div>

    <div id="celebration" class="mt-6 text-2xl font-bold text-green-600 hidden">🎉 Well Done! You solved the puzzle! 🎉</div>

    <div class="mt-12 flex justify-center gap-4">
        <button onclick="startGame()" class="button button-pink text-xl">🔄 Restart</button>
        <button onclick="window.location.href='kow-games.html'" class="button button-blue text-xl">🎮 More Games</button>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script>
    const puzzleContainer = document.getElementById('puzzle-container');
    const celebration = document.getElementById('celebration');
    const gridSize = 3;
    let tiles = [];
    let emptyTile = { row: 2, col: 2 };

    function createTile(index, row, col) {
      const tile = document.createElement('div');
      tile.className = 'puzzle-piece';
      if (index === gridSize * gridSize - 1) {
        tile.classList.add('empty');
      } else {
        tile.textContent = index + 1;
      }
      tile.onclick = () => moveTile(row, col);
      return tile;
    }

    function moveTile(row, col) {
      const dr = Math.abs(row - emptyTile.row);
      const dc = Math.abs(col - emptyTile.col);
      if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
        const tileIndex = row * gridSize + col;
        const emptyIndex = emptyTile.row * gridSize + emptyTile.col;
        [tiles[tileIndex], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[tileIndex]];
        [emptyTile.row, emptyTile.col] = [row, col];
        render();
        checkWin();
      }
    }

    function render() {
      puzzleContainer.innerHTML = '';
      for (let i = 0; i < gridSize; i++) {
        for (let j = 0; j < gridSize; j++) {
          const index = i * gridSize + j;
          const tileData = tiles[index];
          puzzleContainer.appendChild(createTile(tileData, i, j));
        }
      }
    }

    function checkWin() {
      for (let i = 0; i < tiles.length - 1; i++) {
        if (tiles[i] !== i) {
          celebration.classList.add('hidden');
          return;
        }
      }
      celebration.classList.remove('hidden');
      confetti({ particleCount: 150, spread: 90, origin: { y: 0.6 } });
    }

    function shuffle() {
      tiles = Array.from({ length: gridSize * gridSize }, (_, i) => i);
      emptyTile = { row: gridSize - 1, col: gridSize - 1 };
      for (let i = 0; i < 200; i++) {
        const { row, col } = emptyTile;
        const moves = [];
        if (row > 0) moves.push({row: row - 1, col: col});
        if (row < gridSize - 1) moves.push({row: row + 1, col: col});
        if (col > 0) moves.push({row: row, col: col - 1});
        if (col < gridSize - 1) moves.push({row: row, col: col + 1});
        const move = moves[Math.floor(Math.random() * moves.length)];
        const tileIndex = move.row * gridSize + move.col;
        const emptyIndex = emptyTile.row * gridSize + emptyTile.col;
        [tiles[tileIndex], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[tileIndex]];
        emptyTile = move;
      }
    }

    function startGame() {
      celebration.classList.add('hidden');
      shuffle();
      render();
    }

    // Sidebar Logic
    document.getElementById('menu-button').addEventListener('click', () => {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('overlay').classList.add('show');
    });
    document.getElementById('overlay').addEventListener('click', closeSidebar);
    document.getElementById('close-sidebar').addEventListener('click', closeSidebar);
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
    }

    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll(`[data-page="${currentPage}"]`).forEach(btn => btn.style.display = 'none');

    startGame();
  </script>
</body>
</html>
